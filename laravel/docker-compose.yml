version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      APACHE_RUN_USER: www-data
      APACHE_RUN_GROUP: www-data
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: campus
      DB_USERNAME: campus_user
      DB_PASSWORD: secret
    depends_on:
      - db

  db:
    image: mysql:8.1
    container_name: campus_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: campus
      MYSQL_USER: campus_user
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
